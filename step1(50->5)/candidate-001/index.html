<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One-Arm AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>The One-Arm AI Slot Machine</h1>
            <p class="subtitle">Burning through tokens for AGI since 2024</p>
        </header>

        <section class="budget-section">
            <div class="budget-card">
                <span class="label">COMPUTE BUDGET</span>
                <span id="token-balance" class="value">10,000</span>
                <span class="unit">TOKENS</span>
            </div>
        </section>

        <main class="slot-machine">
            <div class="reels-container">
                <div class="reel" id="reel1">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel2">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel3">
                    <div class="reel-strip"></div>
                </div>
                <div class="win-line"></div>
            </div>

            <div class="controls">
                <button id="spin-btn" class="primary-btn">COMPUTE! (1,000 Tokens)</button>
                <div class="secondary-controls">
                    <button id="auto-btn" class="secondary-btn">Autonomous Agent Mode</button>
                    <button id="reset-btn" class="secondary-btn hidden">Request Series A</button>
                </div>
            </div>
        </main>

        <footer class="console">
            <div class="console-header">AI FEEDBACK LOG</div>
            <div id="message-log" class="console-body">
                <div class="message system">> Initializing LLM weights...</div>
                <div class="message system">> Ready for inference.</div>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
