<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity Slots - AI Hype Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>SINGULARITY SLOTS</h1>
            <p class="subtitle">Burn tokens, generate "Value"</p>
        </header>

        <div class="stats-panel">
            <div class="stat">
                <span class="label">Compute Credits:</span>
                <span id="credits">100</span>
            </div>
            <div class="stat">
                <span class="label">Total Hallucinations:</span>
                <span id="hallucinations">0</span>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>
            <button id="spin-btn">RUN INFERENCE (10 CR)</button>
        </div>

        <div class="output-console">
            <div class="console-header">AI INSIGHT GENERATOR</div>
            <div id="message" class="console-text">Ready to disrupt the industry...</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
