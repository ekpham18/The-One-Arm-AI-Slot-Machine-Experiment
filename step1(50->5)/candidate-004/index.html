<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE TOKEN BURNER - AI Satire Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>THE TOKEN BURNER</h1>
            <p class="subtitle">Burning compute for the glory of the model</p>
        </header>

        <section class="dashboard">
            <div class="stat">
                <span class="label">COMPUTE CREDITS:</span>
                <span id="credits" class="value">100</span>
            </div>
            <div class="stat">
                <span class="label">SYNTHETIC TOKENS:</span>
                <span id="tokens" class="value">0</span>
            </div>
        </section>

        <main class="slot-machine">
            <div class="reels">
                <div id="reel1" class="reel">🤖</div>
                <div id="reel2" class="reel">💸</div>
                <div id="reel3" class="reel">😵</div>
            </div>
            <button id="spin-btn">BURN TOKENS</button>
        </main>

        <footer class="status-panel">
            <p id="status-msg">READY TO HALLUCINATE?</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
