<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine: The One-Arm Experiment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI-pocalypse Slot Machine</h1>
        <p class="subtitle">"Training your future, one token at a time."</p>
        
        <div class="stats">
            <div class="stat-box">
                <span class="label">Tokens</span>
                <span id="token-count">1000</span>
            </div>
            <div class="stat-box">
                <span class="label">Total Loss</span>
                <span id="total-loss">0</span>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reel" id="reel-1">?</div>
            <div class="reel" id="reel-2">?</div>
            <div class="reel" id="reel-3">?</div>
        </div>

        <div class="controls">
            <button id="spin-btn">Spin (50 Tokens)</button>
            <button id="reset-btn">Reset Model</button>
        </div>

        <div class="status" id="status-msg">
            Press "Spin" to start training the AGI.
        </div>

        <div class="info-footer">
            <p>Every spin improves our proprietary hallucination engine.</p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
