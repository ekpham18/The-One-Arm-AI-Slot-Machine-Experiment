<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Slot Machine - AGI Synthesis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>NEURAL ENGINE v4.2</h1>
            <p class="tagline">Synthesizing AGI for VC Funding</p>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <span class="label">COMPUTE CREDITS:</span>
                <span id="credits" class="value">1000</span>
            </div>
            <div class="stat">
                <span class="label">HYPE LEVEL:</span>
                <span id="hype" class="value">OVER 9000</span>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>
        </div>

        <div class="controls">
            <button id="spin-button">RUN INFERENCE (100 Credits)</button>
        </div>

        <div class="terminal">
            <div class="terminal-header">SYSTEM LOG</div>
            <div id="log" class="terminal-content">
                <p>> Neural Engine initialized.</p>
                <p>> Scaling laws confirmed.</p>
                <p>> Waiting for compute...</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
