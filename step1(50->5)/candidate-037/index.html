<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hallucinogen 3000 - AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>The Hallucinogen 3000</h1>
            <p class="subtitle">AI-Powered Reality Compression Engine™</p>
        </header>

        <div class="status-panel">
            <div class="status-item">
                <span class="label">Training Tokens:</span>
                <span id="token-count" class="value">500</span>
            </div>
            <div class="status-item">
                <span class="label">Confidence Score:</span>
                <span id="confidence-score" class="value">99.9%</span>
            </div>
        </div>

        <div class="message-box" id="message-box">
            Initialising weights... Ready to overfit.
        </div>

        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel-1">
                    <div class="symbol-container"></div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="symbol-container"></div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="symbol-container"></div>
                </div>
            </div>

            <div class="controls">
                <div class="bet-control">
                    <label for="bet-amount">Bet Size:</label>
                    <select id="bet-amount">
                        <option value="10">10 Tokens</option>
                        <option value="50">50 Tokens</option>
                        <option value="100">100 Tokens</option>
                    </select>
                </div>
                <button id="spin-button">OPTIMIZE (SPIN)</button>
            </div>
        </div>

        <footer>
            <p>Disclaimer: Any resemblance to actual intelligence is purely hallucinated.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
